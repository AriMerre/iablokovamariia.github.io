<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iablokova Mariia | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <span class="logo">Iablokova Mariia</span>
            <span class="menu">Menu</span>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Iablokova Mariia</h1>
            <div class="image-collage">
                <div class="img-large"><img src="path-to-image1.jpg" alt="Project 1"></div>
                <div class="img-small-1"><img src="path-to-image2.jpg" alt="Project 2"></div>
                <div class="img-small-2"><img src="path-to-image3.jpg" alt="Project 3"></div>
            </div>
            <p class="about-text">
                I am UX/UI Designer with a degree in <span>Visual Communication Design</span>. 
                I have hands-on experience in the full design process...
            </p>
        </section>

        <section class="projects">
            <h2>Projects <span>(2023-2025)</span></h2>
            <div class="project-grid">
                <div class="project-card">
                    <h3>IPKN</h3>
                    <p>BRANDING</p>
                    <img src="project1.jpg" alt="IPKN">
                </div>
                <div class="project-card">
                    <h3>CreAid</h3>
                    <p>VISUAL</p>
                    <img src="project2.jpg" alt="CreAid">
                </div>
                <div class="project-card">
                    <h3>DailyShot</h3>
                    <p>UX/UI</p>
                    <img src="project3.jpg" alt="DailyShot">
                </div>
            </div>
        </section>
    </main>

</body>
</html>
